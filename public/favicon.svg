<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="vinyl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a2c"/>
      <stop offset="100%" stop-color="#181819"/>
    </radialGradient>
  </defs>
  <!-- Outer edge -->
  <circle cx="32" cy="32" r="31" fill="#0d0d0e"/>
  <!-- Vinyl body -->
  <circle cx="32" cy="32" r="30" fill="url(#vinyl)"/>
  <!-- Groove rings -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.4"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.4"/>
  <circle cx="32" cy="32" r="21" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.4"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.4"/>
  <circle cx="32" cy="32" r="15" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.4"/>
  <!-- Amber label -->
  <circle cx="32" cy="32" r="11" fill="#d4a04a"/>
  <circle cx="32" cy="32" r="9.4" fill="none" stroke="#c4903a" stroke-width="0.5"/>
  <!-- Brand text -->
  <text x="32" y="30" text-anchor="middle" fill="#2a1a0a" font-size="3.2" font-weight="bold" font-family="Georgia, serif" letter-spacing="0.04em">FRACTAL</text>
  <text x="32" y="35" text-anchor="middle" fill="#2a1a0a" font-size="3.2" font-weight="bold" font-family="Georgia, serif" letter-spacing="0.04em">RECORDS</text>
  <!-- Spindle hole -->
  <circle cx="32" cy="32" r="1.5" fill="#1a1a1a"/>
</svg>
