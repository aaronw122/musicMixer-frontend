<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="marble" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="28%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="72%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="fx" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="disc">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>
  <!-- Outer edge -->
  <circle cx="32" cy="32" r="31" fill="#111"/>
  <!-- Marble vinyl -->
  <g clip-path="url(#disc)">
    <circle cx="32" cy="32" r="42" fill="url(#marble)" filter="url(#fx)"/>
  </g>
  <!-- Groove rings -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="0.4"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="0.4"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="0.4"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="0.4"/>
  <!-- Label -->
  <circle cx="32" cy="32" r="9" fill="#1a1a2e"/>
  <circle cx="32" cy="32" r="7.5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.4"/>
  <!-- Spindle -->
  <circle cx="32" cy="32" r="1.5" fill="#111"/>
</svg>
