# Pure static server for the SPA. /api and /health never reach here — the
# Cloudflare tunnel path-routes those straight to the backend. This container
# only serves the built frontend assets.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Lightweight health endpoint for the deploy check (distinct from the
    # backend's /health, which the tunnel routes elsewhere).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Fingerprinted build assets — safe to cache aggressively (Vite hashes names).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve real files first (about.html, terms.html, favicon, og images…),
    # then fall back to index.html for client-side routes like /remix/{id}.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
