name: Deploy Frontend

on:
  push:
    branches: [main]
    paths-ignore:
      # Docs/config-only changes don't affect the built artifact — skip deploy.
      - '**.md'
      - '.gitignore'
      - '.claude/**'
  workflow_dispatch:

# Independent of the backend's deploy-production group: a frontend deploy must
# never cancel (or be cancelled by) a backend deploy.
concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_GOATCOUNTER_SITE=${{ secrets.VITE_GOATCOUNTER_SITE }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/musicmixer-frontend:latest
            ghcr.io/${{ github.repository_owner }}/musicmixer-frontend:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # Recreate ONLY the frontend container. The backend (and its in-flight
      # remixes / SSE streams) are untouched. Assumes docker-compose.yml on the
      # box already defines the `frontend` service (synced by the backend repo).
      - name: Deploy frontend container
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_HOST }} \
            'cd ~/musicmixer && docker compose pull frontend && docker compose up -d frontend'

      - name: Post-deploy health check
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_HOST }} \
            'sleep 5 && curl -f http://localhost:8080/healthz'

      - name: Prune stale images
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_HOST }} \
            'docker image prune -af'
