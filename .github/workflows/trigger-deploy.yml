name: Trigger Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      # Docs/config-only changes don't affect the built artifact — skip the
      # deploy dispatch to the backend repo so they don't rebuild + redeploy.
      - '**.md'
      - '.gitignore'
      - '.claude/**'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          repository: aaronw122/musicMixer-backend
          event-type: frontend-deploy
